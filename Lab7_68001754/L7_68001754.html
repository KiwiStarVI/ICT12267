<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 7</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        /* ===== Banner Video ===== */
        .banner {
            position: relative;
            height: 300px;
            overflow: hidden;
        }

        .banner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== ปุ่ม Video ===== */
        .video-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            width: 100%;
            z-index: 10;
        }

        .video-controls button {
            margin: 0 10px;
        }

        /* ===== ฟอร์ม ===== */
        .form-wrapper {
            margin-top: 30px;
            max-width: 450px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
        }

        /* ===== Dropdown ===== */
        .form-select {
            background-color: #0d6efd;
            color: white;
            border: none;
        }

        .form-select:focus {
            background-color: #0b5ed7;
            color: white;
        }

        .form-select option {
            color: black;
            background-color: white;
        }
    </style>
</head>

<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">My Website : Worarit Sunawong</a>
    </div>
</nav>

<!-- ===== Banner Video ===== -->
<div class="banner">
    <video id="myVideo" autoplay muted loop>
        <source src="203923-922675870_medium.mp4" type="video/mp4">
    </video>

    <!-- H1 -->
    <h1 class="text-white position-absolute top-50 start-50 translate-middle">
        Worarit Sunawong
    </h1>

    <!-- ปุ่ม -->
    <div class="video-controls">
        <button class="btn btn-warning" onclick="document.getElementById('myVideo').play()">
            <i class="bi bi-play-circle"></i> Play
        </button>

        <button class="btn btn-danger" onclick="document.getElementById('myVideo').pause()">
            <i class="bi bi-stop-circle"></i> Stop
        </button>
    </div>
</div>

<!-- ===== Form ===== -->
<div class="container d-flex justify-content-center">
    <div class="form-wrapper">
        <div class="card p-4 shadow form-card">

            <h4 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h4>

            <form>

                <div class="mb-3">
                    <label class="form-label">ชื่อ-นามสกุล</label>
                    <input type="text" class="form-control" name="fullname" placeholder="กรอกชื่อ-นามสกุล" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">อีเมล</label>
                    <input type="email" class="form-control" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">เพศ</label><br>
                    <input type="radio" name="gender" value="male"> ชาย
                    <input type="radio" name="gender" value="female"> หญิง
                </div>

                <!-- Dropdown -->
                <div class="mb-3">
                    <label class="form-label">ตำแหน่งงาน</label>
                    <select class="form-select" name="position" required>
                        <option value="">-- เลือกตำแหน่ง --</option>
                        <option>Manager</option>
                        <option>Developer</option>
                        <option>Designer</option>
                        <option>Marketing</option>
                    </select>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
